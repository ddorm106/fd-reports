<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Centerville FD — Rescue Driver Daily Performance Report</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.2.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --cfd-red: #b71c1c; --cfd-red-light: #ef5350; --cfd-dark: #2c3e50; --cfd-bg: #f5f5f0; --cfd-card: #fff; --cfd-border: #e0ddd5; --cfd-text: #333; --cfd-label: #666; }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--cfd-bg); color: var(--cfd-text); font-size: 14px; line-height: 1.5; }

        .page-header { background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%); color: white; padding: 16px 24px; border-bottom: 4px solid var(--cfd-red); display: flex; align-items: center; justify-content: center; gap: 20px; }
        .page-header .header-patch { height: 110px; width: 110px; border-radius: 8px; flex-shrink: 0; object-fit: contain; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; line-height: 1.15; text-transform: uppercase; margin: 0; }
        .page-header .subtitle { font-size: 1.1rem; color: var(--cfd-red-light); font-weight: 700; margin-top: 4px; letter-spacing: 1px; font-family: 'IBM Plex Serif', serif; }

        .container { max-width: 900px; margin: 0 auto; padding: 16px; }

        .section { background: var(--cfd-card); border: 1px solid var(--cfd-border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
        .section-toggle { width: 100%; background: none; border: none; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-family: 'IBM Plex Serif', serif; font-size: 1rem; font-weight: 700; color: var(--cfd-dark); }
        .section-toggle::after { content: '▼'; font-size: 0.7rem; transition: transform 0.2s; }
        .section.collapsed .section-toggle::after { transform: rotate(-90deg); }
        .section.collapsed .section-body { display: none; }
        .section-body { padding: 16px 18px; border-top: 1px solid var(--cfd-border); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { font-size: 0.82rem; font-weight: 600; color: var(--cfd-label); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid var(--cfd-border); border-radius: 6px; font-size: 0.95rem; font-family: inherit; background: #fafaf7; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--cfd-red); box-shadow: 0 0 0 2px rgba(183,28,28,0.1); }
        .form-group input[readonly] { background: #eee; color: #555; }
        .form-group textarea { resize: vertical; min-height: 60px; }

        .perf-block { padding: 16px; margin-bottom: 12px; background: #fafaf7; border: 1px solid var(--cfd-border); border-radius: 8px; border-left: 3px solid var(--cfd-red); }
        .perf-block:last-child { margin-bottom: 0; }
        .perf-label { font-size: 0.92rem; font-weight: 600; color: var(--cfd-text); margin-bottom: 10px; line-height: 1.4; }
        .perf-rating label { font-size: 0.78rem; font-weight: 700; color: var(--cfd-label); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
        .perf-rating select { width: 100%; max-width: 320px; padding: 10px 12px; border: 1px solid var(--cfd-border); border-radius: 6px; font-size: 0.95rem; font-family: inherit; background: #fff; margin-bottom: 10px; }
        .perf-rating select:focus { outline: none; border-color: var(--cfd-red); box-shadow: 0 0 0 2px rgba(183,28,28,0.1); }
        .perf-note label { font-size: 0.78rem; font-weight: 700; color: var(--cfd-label); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
        .perf-note textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--cfd-border); border-radius: 6px; font-size: 0.88rem; font-family: inherit; background: #fff; resize: vertical; min-height: 50px; }
        .perf-note textarea:focus { outline: none; border-color: var(--cfd-red); box-shadow: 0 0 0 2px rgba(183,28,28,0.1); }

        .sig-wrapper { background: #fff; border: 2px solid var(--cfd-border); border-radius: 8px; height: 150px; position: relative; max-width: 500px; }
        .sig-wrapper canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
        .sig-actions { display: flex; gap: 10px; margin-top: 8px; }
        .sig-actions button { padding: 6px 16px; background: #eee; border: 1px solid var(--cfd-border); border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
        .sig-actions button:hover { background: #ddd; }

        .action-bar { position: sticky; bottom: 0; background: var(--cfd-dark); padding: 10px 16px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; z-index: 100; border-top: 3px solid var(--cfd-red); }
        .action-bar button { padding: 10px 20px; border: none; border-radius: 6px; font-weight: 700; font-size: 0.85rem; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .btn-primary { background: var(--cfd-red); color: white; }
        .btn-primary:hover { background: #d32f2f; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; }
        .btn-secondary:hover { background: rgba(255,255,255,0.25); }

        .motto { text-align: center; padding: 16px; color: var(--cfd-red); font-family: 'IBM Plex Serif', serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; }

        @media (max-width: 640px) {
            .form-grid { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; text-align: center; padding: 14px 16px; }
            .page-header h1 { font-size: 1.4rem; }
        }
        @media print { .action-bar { display: none; } }
    </style>
</head>

    <div style="text-align:center;">
        <h1>Centerville<br>Fire Department</h1>
        <div class="subtitle">Rescue Driver Daily Performance Report</div>
    </div>
</div>

<div class="container">
<form id="reportForm" autocomplete="off">

<!-- SECTION 1: Driver & Apparatus -->
<div class="section" id="sec-info">
    <button type="button" class="section-toggle" onclick="toggleSection(this)">1. Driver &amp; Apparatus Information</button>
    <div class="section-body">
        <div class="form-grid">
            <div class="form-group">
                <label for="report-date">Date *</label>
                <input type="date" id="report-date" name="Week Ending Date" required>
            </div>
            <div class="form-group">
                <label for="shift">Shift *</label>
                <select id="shift" name="Shift" required>
                    <option value="">— Select —</option>
                    <option>Shift 1</option><option>Shift 2</option><option>Shift 3</option><option>Day Shift</option>
                </select>
            </div>
            <div class="form-group">
                <label for="officer">Officer *</label>
                <select id="officer" name="Officer" required>
                    <option value="">— Select —</option>
                    <option>Sergeant Dorman</option><option>Sergeant Redd</option><option>Sergeant Talley</option><option>Engineer Traxler</option>
                </select>
            </div>
            <div class="form-group">
                <label for="firefighter">Rescue Driver *</label>
                <select id="firefighter" name="Firefighter" required>
                    <option value="">— Select —</option>
                    <option>Barr, H</option><option>Bennett, K</option><option>Cannon, J</option><option>Dunn, P</option>
                    <option>Lightning, L</option><option>Mixon, J</option><option>Mooney, W</option><option>Orona, A</option>
                    <option>Schuler, A</option><option>Smith, M</option><option>Stockholm, J</option><option>Thornton, E</option>
                </select>
            </div>
            <div class="form-group">
                <label>Apparatus Assignment</label>
                <input type="text" name="Apparatus Assignment" value="Rescue 1" readonly>
            </div>
            <div class="form-group">
                <label>Apparatus Type</label>
                <input type="text" name="Apparatus Type" value="2002 Ford F-550 Rescue Chassis" readonly>
            </div>
            <div class="form-group">
                <label for="mileage">Total Mileage / Engine Hours</label>
                <input type="text" id="mileage" name="Total Mileage / Engine Hours" placeholder="e.g. 45,210 miles or 3,120 hours">
            </div>
            <div class="form-group">
                <label for="weather">Weather / Road Conditions</label>
                <input type="text" id="weather" name="Weather / Road Conditions" placeholder="Clear, rain, wet roads, etc.">
            </div>
        </div>
    </div>
</div>

<!-- Dynamic sections inserted by JS -->
<div class="section" id="sec-driving">
    <button type="button" class="section-toggle" onclick="toggleSection(this)">2. Safe Driving &amp; Policy Compliance</button>
    <div class="section-body" id="body-driving"></div>
</div>
<div class="section" id="sec-ppe">
    <button type="button" class="section-toggle" onclick="toggleSection(this)">3. PPE, SCBA &amp; Medical Equipment</button>
    <div class="section-body" id="body-ppe"></div>
</div>
<div class="section" id="sec-rescue">
    <button type="button" class="section-toggle" onclick="toggleSection(this)">4. Rescue Tools &amp; Equipment</button>
    <div class="section-body" id="body-rescue"></div>
</div>
<div class="section" id="sec-mvc">
    <button type="button" class="section-toggle" onclick="toggleSection(this)">5. MVC &amp; Technical Rescue Operations</button>
    <div class="section-body" id="body-mvc"></div>
</div>
<div class="section" id="sec-scene">
    <button type="button" class="section-toggle" onclick="toggleSection(this)">6. Scene Management &amp; Decision Making</button>
    <div class="section-body" id="body-scene"></div>
</div>

<!-- SECTION 7: Overall & Evaluator -->
<div class="section" id="sec-evaluator">
    <button type="button" class="section-toggle" onclick="toggleSection(this)">7. Overall Evaluation &amp; Signature</button>
    <div class="section-body">
        <div class="form-grid">
            <div class="form-group">
                <label for="overall-rating">Overall Driver Proficiency *</label>
                <select id="overall-rating" name="Overall Driver Proficiency" required>
                    <option value="">— Select —</option>
                    <option>Unsatisfactory</option><option>Needs Improvement</option><option>Satisfactory</option><option>Exceeds Expectations</option>
                </select>
            </div>
            <div class="form-group">
                <label for="final-result">Final Evaluation Result *</label>
                <select id="final-result" name="Final Evaluation Result" required>
                    <option value="">— Select —</option>
                    <option>Unsatisfactory</option><option>Needs Improvement</option><option>Satisfactory</option><option>Exceeds Expectations</option>
                </select>
            </div>
            <div class="form-group full">
                <label>Strengths Observed</label>
                <textarea name="Strengths Observed" placeholder="Describe observed strengths..."></textarea>
            </div>
            <div class="form-group full">
                <label>Areas for Improvement</label>
                <textarea name="Areas for Improvement" placeholder="Describe areas needing improvement..."></textarea>
            </div>
            <div class="form-group full">
                <label>Recommended Remedial Training</label>
                <textarea name="Recommended Remedial Training" placeholder="List any recommended training..."></textarea>
            </div>
        </div>
        <hr style="margin:20px 0;border:none;border-top:1px solid var(--cfd-border);">
        <div class="form-grid">
            <div class="form-group">
                <label for="evaluator-name">Evaluator Name *</label>
                <input type="text" id="evaluator-name" name="Evaluator Name" required>
            </div>
            <div class="form-group">
                <label for="evaluator-rank">Evaluator Rank *</label>
                <select id="evaluator-rank" name="Evaluator Rank" required>
                    <option value="">— Select —</option>
                    <option>Firefighter</option><option>Engineer</option><option>Sergeant</option><option>Captain</option><option>Chief</option>
                </select>
            </div>
            <div class="form-group full">
                <label>Evaluator Signature *</label>
                <div class="sig-wrapper"><canvas id="signature-pad"></canvas></div>
                <div class="sig-actions">
                    <button type="button" id="clear-sig">Clear</button>
                    <button type="button" id="undo-sig">Undo</button>
                </div>
            </div>
        </div>
    </div>
</div>

</form>
</div>

<div class="motto">Punctual · Valuable · Selfless</div>

<div class="action-bar">
    <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>

function buildSections(){
    SECTIONS_DATA.forEach(sec=>{
        const container=document.getElementById(sec.id);
        if(!container)return;
        let html='';
        sec.items.forEach(item=>{
            const selOpts=RATING_OPTIONS.map(o=>`<option value="${o}">${o||'— Select Proficiency —'}</option>`).join('');
            html+=`<div class="perf-block">
                <div class="perf-label">${item.label}</div>
                <div class="perf-rating"><label>Proficiency Rating *</label><select name="${item.key} Proficiency" required>${selOpts}</select></div>
                <div class="perf-note"><label>Evaluator Notes</label><textarea name="${item.key} Note" placeholder="${item.note}"></textarea></div>
            </div>`;
        });
        container.innerHTML=html;
    });
}

function toggleSection(btn){ btn.parentElement.classList.toggle('collapsed'); }

function collectFormData(){
    const d={};
    document.querySelectorAll('#reportForm input, #reportForm select, #reportForm textarea').forEach(el=>{
        if(el.value) d[el.name]=el.value;
    });
    return d;
}

function validateForm(){
    const missing=[];
    ['report-date','shift','officer','firefighter','overall-rating','final-result','evaluator-name','evaluator-rank'].forEach(id=>{
        const el=document.getElementById(id);
        if(el&&!el.value) missing.push(el.closest('.form-group')?.querySelector('label')?.textContent?.replace('*','').trim()||id);
    });
    document.querySelectorAll('select[name$=" Proficiency"]').forEach(sel=>{
        if(!sel.value) missing.push(sel.name.replace(' Proficiency',''));
    });
    if(signaturePad&&signaturePad.isEmpty()&&!window.dormanSigned) missing.push('Evaluator Signature');
    if(missing.length){alert('Please complete:\n• '+missing.join('\n• '));return false;}
    return true;
}

function clearForm(){
    if(!confirm('Clear all form data?'))return;
    document.getElementById('reportForm').reset();
    if(signaturePad)signaturePad.clear();
    window.dormanSigned=false;
    localStorage.removeItem('rescueDriverData');
}

// ─── PDF ───
async function generatePDF(forPreview){
    if(!validateForm())return null;
    const data=collectFormData();

    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'letter',compress:true});
    const W=pdf.internal.pageSize.getWidth(),H=pdf.internal.pageSize.getHeight();
    const M=15,PW=W-2*M;
    const RED=[183,28,28],WHITE=[255,255,255],BLACK=[30,30,30],GRAY=[120,120,120],LIGHT=[245,245,240];
    let y=0,pageNum=1;

    function needsPage(h){if(y+h>H-18){addPage();}}
    function drawFullHeader(){
        var hH=44;
        pdf.setFillColor(44,62,80);pdf.rect(0,0,W,hH,'F');
        pdf.setFillColor(...RED);pdf.rect(0,hH,W,2,'F');
        var pS=30,pY=(hH-pS)/2;
        try{pdf.addImage(PATCH_IMG,'PNG',M+4,pY,pS,pS,undefined,'FAST');}catch(e){}
        var tTop=hH/2-12;
        pdf.setTextColor(...WHITE);pdf.setFont('times','bold');pdf.setFontSize(22);
        pdf.text('CENTERVILLE',W/2,tTop,{align:'center'});
        pdf.setFontSize(15);pdf.text('FIRE DEPARTMENT',W/2,tTop+9,{align:'center'});
        pdf.setFontSize(14);pdf.setFont('times','normal');pdf.setTextColor(239,83,80);
        pdf.text('Rescue Driver Daily Performance Report',W/2,tTop+18,{align:'center'});
        pdf.setTextColor(...WHITE);pdf.setFontSize(12);pdf.setFont('times','bold');
        pdf.text(data['Firefighter']||'',W/2,tTop+26,{align:'center'});
        pdf.setTextColor(...BLACK);y=hH+5;
    }
    function drawSlimHeader(){
        var hH=22;
        pdf.setFillColor(44,62,80);pdf.rect(0,0,W,hH,'F');
        pdf.setFillColor(...RED);pdf.rect(0,hH,W,1.5,'F');
        try{pdf.addImage(PATCH_IMG,'PNG',M+2,(hH-14)/2,14,14,undefined,'FAST');}catch(e){}
        pdf.setTextColor(...WHITE);pdf.setFont('times','bold');pdf.setFontSize(11);
        pdf.text('CENTERVILLE FIRE DEPARTMENT',W/2,9,{align:'center'});
        pdf.setFontSize(10);pdf.setFont('times','normal');pdf.setTextColor(239,83,80);
        pdf.text('Rescue Driver — '+(data['Firefighter']||''),W/2,16,{align:'center'});
        pdf.setTextColor(...BLACK);y=hH+4;
    }
    function addPage(){pdf.addPage();pageNum++;drawSlimHeader();}
    function sectionHead(t){needsPage(14);pdf.setFillColor(...LIGHT);pdf.rect(M,y,PW,8,'F');pdf.setFillColor(...RED);pdf.rect(M,y,2,8,'F');pdf.setFont('times','bold');pdf.setFontSize(12);pdf.setTextColor(...RED);pdf.text(t.toUpperCase(),M+5,y+5.5);pdf.setTextColor(...BLACK);y+=10;}
    function kvRow(label,value){if(!value)return;needsPage(7);pdf.setFont('times','normal');pdf.setFontSize(10);pdf.setTextColor(...GRAY);pdf.text(label,M+2,y+3.5);pdf.setTextColor(...BLACK);pdf.setFont('times','bold');var lines=pdf.splitTextToSize(String(value),PW-52);pdf.text(lines,M+50,y+3.5);pdf.setFont('times','normal');y+=Math.max(1,lines.length)*4+1.5;pdf.setDrawColor(220,220,220);pdf.setLineWidth(0.2);pdf.line(M+2,y,M+PW-2,y);y+=0.5;}
    function noteRow(text){if(!text||!text.trim())return;needsPage(10);pdf.setFont('times','italic');pdf.setFontSize(9);pdf.setTextColor(100,100,100);var lines=pdf.splitTextToSize('Note: '+text.trim(),PW-10);pdf.text(lines,M+5,y+3);y+=lines.length*3.5+2;}
    function drawFooter(){
        pdf.setFontSize(8);pdf.setTextColor(...RED);
        pdf.text('PUNCTUAL \u00B7 VALUABLE \u00B7 SELFLESS',W/2,H-10,{align:'center'});
        pdf.setDrawColor(...RED);pdf.setLineWidth(0.3);pdf.line(M,H-14,W-M,H-14);
        pdf.setTextColor(...GRAY);pdf.setFontSize(7);pdf.text('Page '+pageNum,W-M,H-10,{align:'right'});
    }

    drawFullHeader();y+=4;

    sectionHead('Driver & Apparatus Information');
    var dateFmt='N/A';
    if(data['Week Ending Date']){var d2=new Date(data['Week Ending Date']+'T12:00:00');dateFmt=d2.toLocaleDateString('en-US',{month:'long',day:'2-digit',year:'numeric'});}
    kvRow('Date',dateFmt);
    kvRow('Shift',data['Shift']);
    kvRow('Officer',data['Officer']);
    kvRow('Rescue Driver',data['Firefighter']);
    kvRow('Apparatus',data['Apparatus Assignment']);
    kvRow('Type',data['Apparatus Type']);
    kvRow('Mileage/Hours',data['Total Mileage / Engine Hours']);
    kvRow('Weather/Road',data['Weather / Road Conditions']);
    y+=4;

    var pdfSections=[
        {title:'Safe Driving & Policy Compliance',items:['Emergency Vehicle Operation','Warning Devices','Speed Control','Intersection Clearing','Crew Safety']},
        {title:'PPE, SCBA & Medical Equipment',items:['PPE & SCBA Use','SCBA Management','Medical Equipment Check','Medical Compartment Organization','Patient Movement']},
        {title:'Rescue Tools & Equipment',items:['Hydraulic Rescue Tools','Cribbing & Stabilization','Chainsaw','Forcible Entry Tools','Lighting & Power','Rope Rescue Equipment']},
        {title:'MVC & Technical Rescue Operations',items:['MVC Apparatus Positioning','Scene Size-Up','Tool Staging','Patient Access','Interagency Coordination']},
        {title:'Scene Management & Decision Making',items:['ICS Compliance','Communication','Scene Flow','Extended Incident Control','Decision Making']}
    ];
    pdfSections.forEach(sec=>{
        sectionHead(sec.title);
        sec.items.forEach(item=>{kvRow(item,data[item+' Proficiency']||'N/A');noteRow(data[item+' Note']);});
        y+=3;
    });

    needsPage(60);
    sectionHead('Overall Evaluation');
    kvRow('Overall Proficiency',data['Overall Driver Proficiency']);
    kvRow('Final Result',data['Final Evaluation Result']);
    if(data['Strengths Observed']){kvRow('Strengths','');noteRow(data['Strengths Observed']);}
    if(data['Areas for Improvement']){kvRow('Improvements','');noteRow(data['Areas for Improvement']);}
    if(data['Recommended Remedial Training']){kvRow('Remedial Training','');noteRow(data['Recommended Remedial Training']);}
    y+=4;

    sectionHead('Evaluator');
    kvRow('Name',data['Evaluator Name']);
    kvRow('Rank',data['Evaluator Rank']);
    y+=4;
    pdf.setFont('times','normal');pdf.setFontSize(10);pdf.setTextColor(...GRAY);
    pdf.text('Signature:',M+2,y+3);
    try{var sigData=signaturePad.toDataURL('image/jpeg',0.3);pdf.addImage(sigData,'JPEG',M+50,y-2,50,20,undefined,'FAST');}catch(e){}
    y+=24;

    var totalPages=pdf.internal.getNumberOfPages();
    for(var i=1;i<=totalPages;i++){pdf.setPage(i);pageNum=i;drawFooter();}

    if(forPreview){var blob=pdf.output('blob');var url=URL.createObjectURL(blob);window.open(url,'_blank');setTimeout(function(){URL.revokeObjectURL(url);},60000);}
    else{return pdf.output('datauristring').split(',')[1];}
}

function previewPDF(){generatePDF(true);}

async function emailReport(){
    var btn=event.target;btn.disabled=true;btn.textContent='Sending...';
    try{
        var pdfBase64=await generatePDF(false);
        if(!pdfBase64){btn.disabled=false;btn.textContent='Email Report';return;}
        var data=collectFormData();
        var dateFmt='N/A';
        if(data['Week Ending Date']){var d2=new Date(data['Week Ending Date']+'T12:00:00');dateFmt=d2.toLocaleDateString('en-US',{month:'long',day:'2-digit',year:'numeric'});}
        var res=await fetch('/api/send-email',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                subject:'Rescue Driver Report — '+(data['Firefighter']||'Unknown')+' — '+dateFmt,
                html:'<h2>Rescue Driver Daily Performance Report</h2>'+
                    '<p><b>Driver:</b> '+(data['Firefighter']||'N/A')+'</p>'+
                    '<p><b>Date:</b> '+dateFmt+'</p>'+
                    '<p><b>Shift:</b> '+(data['Shift']||'N/A')+'</p>'+
                    '<p><b>Officer:</b> '+(data['Officer']||'N/A')+'</p>'+
                    '<p><b>Overall:</b> '+(data['Overall Driver Proficiency']||'N/A')+'</p>'+
                    '<p><b>Final Result:</b> '+(data['Final Evaluation Result']||'N/A')+'</p>'+
                    '<p><b>Evaluator:</b> '+(data['Evaluator Name']||'')+' ('+(data['Evaluator Rank']||'')+')</p>'+
                    '<p><em>PDF report attached.</em></p>',
                attachments:[{filename:'RescueDriver_'+(data['Firefighter']||'report').replace(/\s+/g,'_')+'_'+dateFmt.replace(/\s+/g,'_')+'.pdf',content:pdfBase64}]
            })
        });
        var result=await res.json();
        if(!result.success)throw new Error(JSON.stringify(result.error));
        alert('Report sent successfully!');
        localStorage.removeItem('rescueDriverData');
    }catch(err){alert('Send failed: '+(err.message||'Unknown error'));}
    finally{btn.disabled=false;btn.textContent='Email Report';}
}

// ─── INIT ───
var signaturePad;
window.dormanSigned=false;
window.addEventListener('load',function(){
    buildSections();

    var dateInput=document.getElementById('report-date');
    var today=new Date();
    dateInput.value=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

    var canvas=document.getElementById('signature-pad');
    signaturePad=new SignaturePad(canvas,{backgroundColor:'rgb(255,255,255)',penColor:'#1e40af'});
    function resizeCanvas(){
        var r=Math.max(window.devicePixelRatio||1,1);
        canvas.width=canvas.offsetWidth*r;canvas.height=canvas.offsetHeight*r;
        canvas.getContext('2d').scale(r,r);signaturePad.clear();
    }
    window.addEventListener('resize',resizeCanvas);
    resizeCanvas();

    document.getElementById('clear-sig').onclick=function(){signaturePad.clear();window.dormanSigned=false;};
    document.getElementById('undo-sig').onclick=function(){var d=signaturePad.toData();if(d.length)d.pop();signaturePad.fromData(d);window.dormanSigned=false;};

    var officerSel=document.getElementById('officer');
    officerSel.addEventListener('change',function(){
        if(officerSel.value==='Sergeant Dorman'){
            document.getElementById('evaluator-name').value='Dorman, David';
            document.getElementById('evaluator-rank').value='Sergeant';
            window.dormanSigned=true;
            var img=new Image();
            img.onload=function(){
                signaturePad.clear();
                var ctx=canvas.getContext('2d');
                var r=Math.max(window.devicePixelRatio||1,1);
                var cw=canvas.width/r,ch=canvas.height/r;
                var scale=Math.min((cw*0.6)/img.width,(ch*0.7)/img.height);
                var dw=img.width*scale,dh=img.height*scale;
                ctx.drawImage(img,(cw-dw)/2,(ch-dh)/2,dw,dh);
                signaturePad._data=[{points:[{x:0,y:0,time:Date.now(),pressure:0.5}]}];
            };
            img.src=DORMAN_SIG;
        }
    });

    var saved=JSON.parse(localStorage.getItem('rescueDriverData')||'{}');
    Object.keys(saved).forEach(function(key){
        var els=document.querySelectorAll('[name="'+key+'"]');
        els.forEach(function(el){if(!el.readOnly)el.value=saved[key]||'';});
    });

    document.getElementById('reportForm').addEventListener('change',function(){
        localStorage.setItem('rescueDriverData',JSON.stringify(collectFormData()));
    });
});
</script>
