<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Pre-Plan Floor Plan (v2)</title>
<link rel="stylesheet" href="styles-preplan.css">
<style>
  /* ───────── New page 11 — fabric.js removed, pure Canvas 2D ───────── */
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif; background:#f5f5f7; }

  .fp-toolbar {
    display:flex; gap:6px; padding:8px 10px; background:#24242a; color:#fff;
    flex-wrap:wrap; align-items:center; position:sticky; top:0; z-index:30;
    border-bottom:1px solid #000;
  }
  .fp-toolbar button {
    background:#333a44; color:#fff; border:1px solid #4a5568; padding:7px 12px;
    border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; white-space:nowrap;
    transition:all .12s;
  }
  .fp-toolbar button:hover { background:#4a5568; }
  .fp-toolbar button.active { background:#c0392b; border-color:#c0392b; }
  .fp-toolbar button.primary { background:#1e3a5f; border-color:#1e3a5f; }
  .fp-toolbar button.primary:hover { background:#2c5282; }
  .fp-toolbar .sep { width:1px; height:24px; background:#4a5568; margin:0 4px; }
  .fp-toolbar .title { font-size:13px; color:#aaa; margin-left:auto; margin-right:8px; }

  .fp-container { position:relative; padding:12px; max-width:1400px; margin:0 auto; }

  .fp-canvas-wrap {
    background:#fff; border:2px solid #cbd5e1; border-radius:12px; overflow:hidden;
    position:relative; touch-action:none;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  #fpCanvas {
    display:block; background:
      linear-gradient(to right,#e8ecf2 1px,transparent 1px),
      linear-gradient(to bottom,#e8ecf2 1px,transparent 1px),
      linear-gradient(to right,#d1d8e4 1px,transparent 1px),
      linear-gradient(to bottom,#d1d8e4 1px,transparent 1px),
      #fff;
    background-size:10px 10px,10px 10px,50px 50px,50px 50px;
    touch-action:none;
    cursor:default;
  }
  #fpCanvas.mode-pan { cursor:grab; }
  #fpCanvas.mode-pan:active { cursor:grabbing; }
  #fpCanvas.mode-select { cursor:pointer; }
  #fpCanvas.mode-marker { cursor:crosshair; }
  #fpCanvas.mode-delete { cursor:not-allowed; }

  /* Layers panel — floating right side */
  .fp-layers {
    position:absolute; top:60px; right:22px; background:rgba(36,36,42,0.96); color:#fff;
    border-radius:10px; padding:12px 14px; font-size:12px; min-width:190px;
    box-shadow:0 4px 16px rgba(0,0,0,0.3); backdrop-filter:blur(8px); z-index:20;
    transition:transform .2s, opacity .2s;
  }
  .fp-layers.hidden { transform:translateX(220px); opacity:0; pointer-events:none; }
  .fp-layers h4 { margin:0 0 8px 0; font-size:12px; color:#ccc; text-transform:uppercase; letter-spacing:1px; }
  .fp-layers label {
    display:flex; align-items:center; gap:8px; padding:6px 0;
    cursor:pointer; user-select:none;
  }
  .fp-layers label:hover { color:#e67e22; }
  .fp-layers input[type=checkbox] { accent-color:#c0392b; width:16px; height:16px; }
  .fp-layers .count { color:#888; font-size:11px; margin-left:auto; }
  .fp-layers .swatch { width:14px; height:14px; border-radius:3px; border:1px solid #555; }

  /* Selection edit panel — floating bottom */
  .fp-edit {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:rgba(30,30,36,0.98); color:#fff; border-radius:14px;
    padding:14px 18px; min-width:320px; max-width:calc(100vw - 40px);
    box-shadow:0 8px 32px rgba(0,0,0,0.4); z-index:25;
    backdrop-filter:blur(8px);
    display:none; flex-direction:column; gap:10px;
  }
  .fp-edit.active { display:flex; }
  .fp-edit .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .fp-edit .title { font-weight:700; font-size:14px; flex:1; }
  .fp-edit .meta { color:#aaa; font-size:11px; }
  .fp-edit button {
    background:#333a44; color:#fff; border:1px solid #4a5568; padding:6px 12px;
    border-radius:6px; cursor:pointer; font-size:12px; font-weight:600;
  }
  .fp-edit button.danger { background:#c0392b; border-color:#c0392b; }
  .fp-edit button.danger:hover { background:#e74c3c; }
  .fp-edit button.primary { background:#1e3a5f; border-color:#1e3a5f; }
  .fp-edit input, .fp-edit select {
    background:#1a1a1e; border:1px solid #4a5568; color:#fff;
    padding:6px 10px; border-radius:6px; font-size:12px; width:100%;
  }
  .fp-edit input:focus, .fp-edit select:focus { border-color:#c0392b; outline:none; }

  /* Add-marker picker */
  .fp-marker-picker {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:rgba(30,30,36,0.98); color:#fff; border-radius:14px; padding:12px;
    display:none; z-index:26; box-shadow:0 8px 32px rgba(0,0,0,0.4);
    max-width:400px;
  }
  .fp-marker-picker.active { display:block; }
  .fp-marker-picker h4 { margin:0 0 10px; font-size:13px; }
  .fp-marker-picker .marker-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .fp-marker-picker .marker-grid button {
    background:#333a44; border:1px solid #4a5568; color:#fff; padding:8px 4px;
    border-radius:6px; cursor:pointer; font-size:11px; text-align:center;
  }
  .fp-marker-picker .marker-grid button:hover { background:#c0392b; border-color:#c0392b; }

  /* 3D view wrapper */
  .fp-canvas-wrap.perspective {
    perspective:1800px; perspective-origin:50% 40%;
  }
  .fp-canvas-wrap.perspective #fpCanvas {
    transform:rotateX(55deg) scale(0.9); transform-origin:50% 50%;
    transition:transform 0.4s;
  }
  .fp-canvas-wrap #fpCanvas { transition:transform 0.4s; }

  /* Info banner */
  .fp-info {
    background:#e3f2fd; color:#0d47a1; border-left:4px solid #1e88e5;
    padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:12px;
  }
  .fp-info.err { background:#fef2f2; color:#991b1b; border-color:#c0392b; }
  .fp-info.ok  { background:#f0fdf4; color:#166534; border-color:#22c55e; }

  @media (max-width:720px) {
    .fp-layers { top:auto; bottom:16px; right:16px; left:16px; width:auto; }
    .fp-edit { left:10px; right:10px; transform:none; min-width:0; max-width:none; }
    .fp-marker-picker { left:10px; right:10px; transform:none; max-width:none; }
    .fp-toolbar { gap:4px; padding:6px; }
    .fp-toolbar button { padding:6px 8px; font-size:11px; }
    .fp-toolbar .title { display:none; }
  }
</style>
</head>
<body>

<div class="fp-toolbar">
  <button id="tbSelect" class="active" onclick="FP.setMode('select')">✋ Select</button>
  <button id="tbPan" onclick="FP.setMode('pan')">✥ Pan</button>
  <button id="tbAddMarker" onclick="FP.openMarkerPicker()">📍 Marker</button>
  <button id="tbDelete" onclick="FP.setMode('delete')">🗑 Delete</button>
  <div class="sep"></div>
  <button id="tb3D" onclick="FP.toggle3D()">⛶ 3D</button>
  <button id="tbLayers" onclick="FP.toggleLayers()">☰ Layers</button>
  <div class="sep"></div>
  <button id="tbZoomIn" onclick="FP.zoom(1.25)">+</button>
  <button id="tbZoomOut" onclick="FP.zoom(0.8)">−</button>
  <button id="tbFit" onclick="FP.fitToScreen()">⊡ Fit</button>
  <div class="sep"></div>
  <button class="primary" onclick="FP.loadLatest()">↓ Load Latest</button>
  <button class="primary" onclick="FP.saveToForm()">✓ Save</button>
  <button onclick="FP.clearAll()" title="Start fresh">⟲</button>
  <div class="title" id="planTitle">No plan loaded</div>
</div>

<div class="fp-container">
  <div class="fp-info" id="fpBanner" style="display:none"></div>

  <div class="fp-canvas-wrap" id="canvasWrap">
    <canvas id="fpCanvas" width="1200" height="800"></canvas>
  </div>

  <div class="fp-layers" id="layersPanel">
    <h4>Layers</h4>
    <label><input type="checkbox" id="lyrWalls" checked onchange="FP.redraw()"><span class="swatch" style="background:#222"></span>Walls<span class="count" id="cntWalls">0</span></label>
    <label><input type="checkbox" id="lyrDoors" checked onchange="FP.redraw()"><span class="swatch" style="background:#c0392b"></span>Doors<span class="count" id="cntDoors">0</span></label>
    <label><input type="checkbox" id="lyrWindows" checked onchange="FP.redraw()"><span class="swatch" style="background:#1e88e5"></span>Windows<span class="count" id="cntWindows">0</span></label>
    <label><input type="checkbox" id="lyrObjects" checked onchange="FP.redraw()"><span class="swatch" style="background:#6b7280"></span>Objects<span class="count" id="cntObjects">0</span></label>
    <label><input type="checkbox" id="lyrMarkers" checked onchange="FP.redraw()"><span class="swatch" style="background:#fbbf24"></span>Markers<span class="count" id="cntMarkers">0</span></label>
    <label><input type="checkbox" id="lyrGrid" checked onchange="FP.redraw()"><span class="swatch" style="background:#fff;border-color:#999"></span>Grid</label>
  </div>
</div>

<!-- Edit panel -->
<div class="fp-edit" id="editPanel">
  <div class="row">
    <div class="title" id="editTitle">Element</div>
    <div class="meta" id="editMeta"></div>
    <button onclick="FP.closeEdit()" style="background:transparent;border:0;color:#888;padding:2px 8px">✕</button>
  </div>
  <div id="editBody"></div>
  <div class="row" style="justify-content:flex-end">
    <button class="danger" onclick="FP.deleteSelected()">🗑 Delete</button>
  </div>
</div>

<!-- Marker picker -->
<div class="fp-marker-picker" id="markerPicker">
  <h4>Place a marker — tap a spot on the floor plan</h4>
  <div class="marker-grid" id="markerGrid"></div>
  <div class="row" style="margin-top:10px;justify-content:flex-end;gap:6px">
    <button onclick="FP.closeMarkerPicker()" style="background:#333a44;border:0;color:#fff;padding:6px 12px;border-radius:6px">Cancel</button>
  </div>
</div>

<!-- ───────── PAGE 11 v2 — pure-canvas floor plan editor ───────── -->
<script>
(function(){
  'use strict';

  // ─── State ────────────────────────────────────────────────────────────
  const state = {
    // Geometry loaded from /api/jobs/{id} → ai_form_data.layout
    // (coords are in canvas pixels at scale_px_per_ft=12 by default)
    plan: null,       // {canvas_width, canvas_height, scale_px_per_ft, walls, doors, windows, objects}
    markers: [],      // [{id, name, category, x, y, note}]
    meta: null,       // job meta (id, building_name, etc.)
    dept: 'CFD',

    // View transform (canvas px → screen px)
    view: { offsetX: 0, offsetY: 0, zoom: 1 },

    // Interaction
    mode: 'select',   // 'select' | 'pan' | 'marker' | 'delete'
    pendingMarkerType: null,
    selected: null,   // {kind:'wall'|'door'|...|'marker', index:int}
    drag: null,       // active drag state
    is3D: false,
    layersVisible: true,

    // Dimensions
    cssW: 1200, cssH: 800, dpr: 1,
  };

  // Common firefighter markers (keep compact for mobile)
  const MARKER_TYPES = [
    { id:'fdc',              name:'FDC',         cat:'fire_protection', color:'#c0392b' },
    { id:'knox_box',         name:'Knox',        cat:'access',          color:'#e67e22' },
    { id:'fire_hydrant',     name:'Hydrant',     cat:'water',           color:'#1e88e5' },
    { id:'sprinkler_riser',  name:'Riser',       cat:'fire_protection', color:'#c0392b' },
    { id:'fire_alarm_panel', name:'FA Panel',    cat:'fire_protection', color:'#e67e22' },
    { id:'gas_shutoff',      name:'Gas',         cat:'utility',         color:'#fbbf24' },
    { id:'electric_panel',   name:'Electric',    cat:'utility',         color:'#fbbf24' },
    { id:'water_shutoff',    name:'Water',       cat:'utility',         color:'#1e88e5' },
    { id:'exit',             name:'Exit',        cat:'access',          color:'#22c55e' },
    { id:'stairs',           name:'Stairs',      cat:'access',          color:'#6b7280' },
    { id:'elevator',         name:'Elevator',    cat:'access',          color:'#6b7280' },
    { id:'hazmat',           name:'Hazmat',      cat:'hazmat',          color:'#ef4444' },
  ];

  // ─── Canvas setup ─────────────────────────────────────────────────────
  const canvas = document.getElementById('fpCanvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    const wrap = document.getElementById('canvasWrap');
    const w = wrap.clientWidth;
    const h = Math.max(400, Math.min(window.innerHeight - 180, 900));
    state.cssW = w;
    state.cssH = h;
    state.dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.round(w * state.dpr);
    canvas.height = Math.round(h * state.dpr);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    redraw();
  }

  // ─── Transform helpers ────────────────────────────────────────────────
  function screenToCanvas(sx, sy) {
    // Convert CSS-pixel screen coords to floor-plan canvas coords
    return {
      x: (sx - state.view.offsetX) / state.view.zoom,
      y: (sy - state.view.offsetY) / state.view.zoom,
    };
  }
  function canvasToScreen(cx, cy) {
    return {
      x: cx * state.view.zoom + state.view.offsetX,
      y: cy * state.view.zoom + state.view.offsetY,
    };
  }

  // ─── Draw ─────────────────────────────────────────────────────────────
  function redraw() {
    ctx.save();
    ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0); // reset to CSS-px
    ctx.clearRect(0, 0, state.cssW, state.cssH);

    if (!state.plan) {
      // Empty state
      ctx.fillStyle = '#888';
      ctx.font = '16px -apple-system,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('No floor plan loaded', state.cssW/2, state.cssH/2 - 10);
      ctx.font = '13px -apple-system,sans-serif';
      ctx.fillStyle = '#aaa';
      ctx.fillText('Tap "Load Latest" to import your DivisionScan capture', state.cssW/2, state.cssH/2 + 14);
      ctx.restore();
      return;
    }

    ctx.translate(state.view.offsetX, state.view.offsetY);
    ctx.scale(state.view.zoom, state.view.zoom);

    const p = state.plan;
    const L = {
      walls:   document.getElementById('lyrWalls').checked,
      doors:   document.getElementById('lyrDoors').checked,
      windows: document.getElementById('lyrWindows').checked,
      objects: document.getElementById('lyrObjects').checked,
      markers: document.getElementById('lyrMarkers').checked,
    };

    // Plan outline
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1 / state.view.zoom;
    ctx.strokeRect(0, 0, p.canvas_width, p.canvas_height);

    // Objects (draw first — under walls)
    if (L.objects && p.objects) {
      p.objects.forEach((o, i) => drawObject(o, i));
    }
    // Walls
    if (L.walls && p.walls) {
      p.walls.forEach((w, i) => drawWall(w, i));
    }
    // Doors
    if (L.doors && p.doors) {
      p.doors.forEach((d, i) => drawDoor(d, i));
    }
    // Windows
    if (L.windows && p.windows) {
      p.windows.forEach((w, i) => drawWindow(w, i));
    }
    // Markers on top
    if (L.markers && state.markers) {
      state.markers.forEach((m, i) => drawMarker(m, i));
    }

    ctx.restore();

    updateCounts();
  }

  function drawWall(w, i) {
    const selected = isSelected('wall', i);
    ctx.strokeStyle = selected ? '#c0392b' : '#222';
    ctx.lineWidth = selected ? 8 / state.view.zoom : 6 / state.view.zoom;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(w.x1, w.y1);
    ctx.lineTo(w.x2, w.y2);
    ctx.stroke();
  }

  function drawDoor(d, i) {
    const selected = isSelected('door', i);
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate((d.angle || 0) * Math.PI / 180);
    const w = d.width || 30;

    // Door as a break in wall + arc for swing
    ctx.fillStyle = '#fff';
    ctx.fillRect(-w/2, -4, w, 8);

    ctx.strokeStyle = selected ? '#c0392b' : '#c0392b';
    ctx.lineWidth = selected ? 4 / state.view.zoom : 2 / state.view.zoom;

    // Draw the swing arc — single doors swing, double is a double-swing, rollup is straight
    if (d.type === 'double') {
      ctx.beginPath();
      ctx.arc(-w/4, -4, w/2, -Math.PI/2, 0);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc( w/4, -4, w/2, Math.PI, 3*Math.PI/2);
      ctx.stroke();
    } else if (d.type === 'rollup') {
      // Rollup: dashed line
      ctx.setLineDash([4/state.view.zoom, 3/state.view.zoom]);
      ctx.beginPath();
      ctx.moveTo(-w/2, 0); ctx.lineTo(w/2, 0);
      ctx.stroke();
      ctx.setLineDash([]);
    } else {
      // single swing
      ctx.beginPath();
      ctx.arc(-w/2, -4, w, 0, Math.PI/2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-w/2, -4); ctx.lineTo(w/2, -4);
      ctx.stroke();
    }

    if (selected) {
      // Big highlight circle
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth = 2 / state.view.zoom;
      ctx.setLineDash([4/state.view.zoom, 4/state.view.zoom]);
      ctx.beginPath();
      ctx.arc(0, 0, w/2 + 10, 0, 2*Math.PI);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.restore();
  }

  function drawWindow(w, i) {
    const selected = isSelected('window', i);
    ctx.save();
    ctx.translate(w.x, w.y);
    ctx.rotate((w.angle || 0) * Math.PI / 180);
    const ww = w.width || 30;

    ctx.strokeStyle = selected ? '#c0392b' : '#1e88e5';
    ctx.lineWidth = selected ? 4 / state.view.zoom : 3 / state.view.zoom;
    // Three parallel lines = window glyph
    ctx.beginPath();
    ctx.moveTo(-ww/2, -3); ctx.lineTo(ww/2, -3);
    ctx.moveTo(-ww/2,  0); ctx.lineTo(ww/2,  0);
    ctx.moveTo(-ww/2,  3); ctx.lineTo(ww/2,  3);
    ctx.stroke();
    ctx.restore();
  }

  function drawObject(o, i) {
    const selected = isSelected('object', i);
    ctx.save();
    ctx.translate(o.x, o.y);
    ctx.rotate((o.angle || 0) * Math.PI / 180);
    const w = o.width || 20, d = o.depth || 20;

    ctx.fillStyle = selected ? 'rgba(192,57,43,0.2)' : 'rgba(107,114,128,0.15)';
    ctx.strokeStyle = selected ? '#c0392b' : '#6b7280';
    ctx.lineWidth = (selected ? 2 : 1) / state.view.zoom;
    ctx.beginPath();
    ctx.rect(-w/2, -d/2, w, d);
    ctx.fill();
    ctx.stroke();

    // Label
    if (state.view.zoom > 0.6) {
      ctx.fillStyle = '#333';
      ctx.font = (10 / state.view.zoom) + 'px -apple-system,sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(o.label || o.category || '', 0, 0);
    }
    ctx.restore();
  }

  function drawMarker(m, i) {
    const type = MARKER_TYPES.find(t => t.id === (m.marker_type_id || m.category || m.id)) || MARKER_TYPES[0];
    const selected = isSelected('marker', i);
    const r = 14 / state.view.zoom;

    ctx.save();
    ctx.translate(m.x, m.y);
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.arc(1, 2, r, 0, 2*Math.PI);
    ctx.fill();
    // Pin body
    ctx.fillStyle = type.color || '#fbbf24';
    ctx.strokeStyle = selected ? '#fff' : 'rgba(0,0,0,0.4)';
    ctx.lineWidth = (selected ? 3 : 1.5) / state.view.zoom;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, 2*Math.PI);
    ctx.fill();
    ctx.stroke();
    // Label letter
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + (11 / state.view.zoom) + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText((m.name || type.name).substr(0,3).toUpperCase(), 0, 0);

    if (selected) {
      // Outer ring
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth = 2 / state.view.zoom;
      ctx.setLineDash([4/state.view.zoom, 4/state.view.zoom]);
      ctx.beginPath();
      ctx.arc(0, 0, r + 8, 0, 2*Math.PI);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.restore();
  }

  function isSelected(kind, i) {
    return state.selected && state.selected.kind === kind && state.selected.index === i;
  }

  // ─── Hit testing ──────────────────────────────────────────────────────
  function hitTest(cx, cy) {
    // Order: markers (on top) > doors > windows > objects > walls
    const HIT = 14 / state.view.zoom;

    if (state.plan) {
      // Markers
      for (let i = state.markers.length - 1; i >= 0; i--) {
        const m = state.markers[i];
        if (Math.hypot(m.x - cx, m.y - cy) < 18 / state.view.zoom)
          return { kind:'marker', index:i };
      }
      // Doors (circular hit around door center, generous radius)
      if (state.plan.doors) {
        for (let i = 0; i < state.plan.doors.length; i++) {
          const d = state.plan.doors[i];
          const r = Math.max((d.width||30)/2 + HIT, HIT * 2.5);
          if (Math.hypot(d.x - cx, d.y - cy) < r) return { kind:'door', index:i };
        }
      }
      // Windows
      if (state.plan.windows) {
        for (let i = 0; i < state.plan.windows.length; i++) {
          const w = state.plan.windows[i];
          const r = Math.max((w.width||30)/2 + HIT, HIT * 2.5);
          if (Math.hypot(w.x - cx, w.y - cy) < r) return { kind:'window', index:i };
        }
      }
      // Objects (rotated-rectangle hit test)
      if (state.plan.objects) {
        for (let i = state.plan.objects.length - 1; i >= 0; i--) {
          const o = state.plan.objects[i];
          const a = (o.angle || 0) * Math.PI / 180;
          const dx = cx - o.x, dy = cy - o.y;
          const lx = dx * Math.cos(-a) - dy * Math.sin(-a);
          const ly = dx * Math.sin(-a) + dy * Math.cos(-a);
          if (Math.abs(lx) < (o.width||20)/2 + HIT && Math.abs(ly) < (o.depth||20)/2 + HIT)
            return { kind:'object', index:i };
        }
      }
      // Walls (line hit test)
      if (state.plan.walls) {
        for (let i = 0; i < state.plan.walls.length; i++) {
          const w = state.plan.walls[i];
          if (pointToSegmentDist(cx, cy, w.x1, w.y1, w.x2, w.y2) < HIT)
            return { kind:'wall', index:i };
        }
      }
    }
    return null;
  }

  function pointToSegmentDist(px, py, x1, y1, x2, y2) {
    const dx = x2-x1, dy = y2-y1;
    if (dx === 0 && dy === 0) return Math.hypot(px-x1, py-y1);
    const t = Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / (dx*dx + dy*dy)));
    return Math.hypot(px - (x1 + t*dx), py - (y1 + t*dy));
  }

  // ─── Touch/mouse pointer handling ─────────────────────────────────────
  let activePointers = new Map();
  let pinchStart = null;

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    activePointers.set(e.pointerId, { sx, sy, startSx: sx, startSy: sy });

    if (activePointers.size === 2) {
      // Start pinch
      const [a, b] = Array.from(activePointers.values());
      pinchStart = {
        dist: Math.hypot(a.sx - b.sx, a.sy - b.sy),
        zoom: state.view.zoom,
        midSx: (a.sx + b.sx) / 2,
        midSy: (a.sy + b.sy) / 2,
      };
      return;
    }

    // Single-pointer action
    const cp = screenToCanvas(sx, sy);
    const hit = hitTest(cp.x, cp.y);

    if (state.mode === 'marker') {
      if (state.pendingMarkerType) {
        const type = MARKER_TYPES.find(t => t.id === state.pendingMarkerType) || MARKER_TYPES[0];
        state.markers.push({
          id: 'mk_' + Date.now() + '_' + Math.floor(Math.random()*9999),
          marker_type_id: type.id,
          name: type.name,
          category: type.cat,
          x: cp.x, y: cp.y, note: ''
        });
        // Keep marker mode active with same type so multiple markers can be
        // placed in a row. User cancels by hitting Select or another tool.
        showBanner('Placed ' + type.name + ' — tap again to place another, or pick a different tool', 'ok');
        redraw();
      }
      return;
    }

    if (state.mode === 'delete') {
      if (hit) {
        state.selected = hit;
        deleteSelected();
      }
      return;
    }

    if (state.mode === 'pan') {
      state.drag = { kind:'pan', lastSx: sx, lastSy: sy };
      return;
    }

    // select mode
    if (hit) {
      state.selected = hit;
      openEdit();
      // Start drag to move
      state.drag = { kind:'move', lastCx: cp.x, lastCy: cp.y };
    } else {
      // tap empty → start pan
      state.drag = { kind:'pan', lastSx: sx, lastSy: sy };
      state.selected = null;
      closeEdit();
    }
    redraw();
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!activePointers.has(e.pointerId)) return;
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    const p = activePointers.get(e.pointerId);
    p.sx = sx; p.sy = sy;

    if (activePointers.size === 2 && pinchStart) {
      // Pinch-zoom
      const [a, b] = Array.from(activePointers.values());
      const dist = Math.hypot(a.sx - b.sx, a.sy - b.sy);
      const newZoom = Math.max(0.2, Math.min(5, pinchStart.zoom * dist / pinchStart.dist));
      // Keep midpoint stable
      const cp = screenToCanvas(pinchStart.midSx, pinchStart.midSy);
      state.view.zoom = newZoom;
      state.view.offsetX = pinchStart.midSx - cp.x * newZoom;
      state.view.offsetY = pinchStart.midSy - cp.y * newZoom;
      redraw();
      return;
    }

    if (!state.drag) return;

    if (state.drag.kind === 'pan') {
      state.view.offsetX += sx - state.drag.lastSx;
      state.view.offsetY += sy - state.drag.lastSy;
      state.drag.lastSx = sx;
      state.drag.lastSy = sy;
      redraw();
    } else if (state.drag.kind === 'move' && state.selected) {
      const cp = screenToCanvas(sx, sy);
      const dx = cp.x - state.drag.lastCx;
      const dy = cp.y - state.drag.lastCy;
      moveSelected(dx, dy);
      state.drag.lastCx = cp.x;
      state.drag.lastCy = cp.y;
      redraw();
    }
  });

  function endPointer(e) {
    activePointers.delete(e.pointerId);
    if (activePointers.size < 2) pinchStart = null;
    if (activePointers.size === 0) state.drag = null;
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('pointerleave', endPointer);

  // Wheel zoom
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    zoomAt(sx, sy, factor);
  }, { passive:false });

  function zoomAt(sx, sy, factor) {
    const cp = screenToCanvas(sx, sy);
    state.view.zoom = Math.max(0.2, Math.min(5, state.view.zoom * factor));
    state.view.offsetX = sx - cp.x * state.view.zoom;
    state.view.offsetY = sy - cp.y * state.view.zoom;
    redraw();
  }

  // ─── Move / Delete ────────────────────────────────────────────────────
  function moveSelected(dx, dy) {
    if (!state.selected || !state.plan) return;
    const s = state.selected;
    if (s.kind === 'wall') {
      const w = state.plan.walls[s.index];
      w.x1 += dx; w.y1 += dy; w.x2 += dx; w.y2 += dy;
    } else if (s.kind === 'door' && state.plan.doors) {
      state.plan.doors[s.index].x += dx;
      state.plan.doors[s.index].y += dy;
    } else if (s.kind === 'window' && state.plan.windows) {
      state.plan.windows[s.index].x += dx;
      state.plan.windows[s.index].y += dy;
    } else if (s.kind === 'object' && state.plan.objects) {
      state.plan.objects[s.index].x += dx;
      state.plan.objects[s.index].y += dy;
    } else if (s.kind === 'marker') {
      state.markers[s.index].x += dx;
      state.markers[s.index].y += dy;
    }
  }

  function deleteSelected() {
    if (!state.selected) return;
    const s = state.selected;
    if (s.kind === 'wall') state.plan.walls.splice(s.index, 1);
    else if (s.kind === 'door') state.plan.doors.splice(s.index, 1);
    else if (s.kind === 'window') state.plan.windows.splice(s.index, 1);
    else if (s.kind === 'object') state.plan.objects.splice(s.index, 1);
    else if (s.kind === 'marker') state.markers.splice(s.index, 1);
    state.selected = null;
    closeEdit();
    redraw();
  }

  // ─── Edit panel ───────────────────────────────────────────────────────
  function openEdit() {
    if (!state.selected) return;
    const s = state.selected;
    const panel = document.getElementById('editPanel');
    const title = document.getElementById('editTitle');
    const meta  = document.getElementById('editMeta');
    const body  = document.getElementById('editBody');

    if (s.kind === 'wall') {
      const w = state.plan.walls[s.index];
      const lenFt = Math.hypot(w.x2 - w.x1, w.y2 - w.y1) / (state.plan.scale_px_per_ft || 12);
      title.textContent = 'Wall ' + (s.index+1);
      meta.textContent = lenFt.toFixed(1) + ' ft';
      body.innerHTML = '';
    } else if (s.kind === 'door') {
      const d = state.plan.doors[s.index];
      title.textContent = 'Door ' + (s.index+1);
      meta.textContent = (d.width / (state.plan.scale_px_per_ft || 12)).toFixed(1) + ' ft';
      body.innerHTML = '<div class="row"><label style="flex:1">Type <select id="ed_doorType"><option value="single">Single swing</option><option value="double">Double</option><option value="rollup">Rollup</option></select></label></div>';
      document.getElementById('ed_doorType').value = d.type || 'single';
      document.getElementById('ed_doorType').onchange = (e) => { d.type = e.target.value; redraw(); };
    } else if (s.kind === 'window') {
      const w = state.plan.windows[s.index];
      title.textContent = 'Window ' + (s.index+1);
      meta.textContent = (w.width / (state.plan.scale_px_per_ft || 12)).toFixed(1) + ' ft';
      body.innerHTML = '';
    } else if (s.kind === 'object') {
      const o = state.plan.objects[s.index];
      title.textContent = o.label || o.category || 'Object';
      const scale = state.plan.scale_px_per_ft || 12;
      meta.textContent = (o.width/scale).toFixed(1) + ' × ' + (o.depth/scale).toFixed(1) + ' ft';
      body.innerHTML = '<div class="row"><label style="flex:1">Label <input id="ed_objLabel" type="text"></label></div>';
      const inp = document.getElementById('ed_objLabel');
      inp.value = o.label || '';
      inp.oninput = (e) => { o.label = e.target.value; redraw(); };
    } else if (s.kind === 'marker') {
      const m = state.markers[s.index];
      title.textContent = m.name || 'Marker';
      meta.textContent = m.category || '';
      body.innerHTML = '<div class="row"><label style="flex:1">Note <input id="ed_mkNote" type="text" placeholder="Optional note"></label></div>';
      const inp = document.getElementById('ed_mkNote');
      inp.value = m.note || '';
      inp.oninput = (e) => { m.note = e.target.value; };
    }
    panel.classList.add('active');
  }

  function closeEdit() {
    document.getElementById('editPanel').classList.remove('active');
  }

  // ─── Marker picker ────────────────────────────────────────────────────
  function openMarkerPicker() {
    const grid = document.getElementById('markerGrid');
    grid.innerHTML = '';
    MARKER_TYPES.forEach(t => {
      const b = document.createElement('button');
      b.textContent = t.name;
      b.style.borderLeft = '4px solid ' + t.color;
      b.onclick = () => {
        state.pendingMarkerType = t.id;
        state.mode = 'marker';
        syncToolbar();
        document.getElementById('markerPicker').classList.remove('active');
        showBanner('Tap on the floor plan where you want to place the ' + t.name + ' marker', 'ok');
      };
      grid.appendChild(b);
    });
    document.getElementById('markerPicker').classList.add('active');
    closeEdit();
  }
  function closeMarkerPicker() {
    document.getElementById('markerPicker').classList.remove('active');
    state.pendingMarkerType = null;
    state.mode = 'select';
    syncToolbar();
  }

  // ─── Toolbar sync ─────────────────────────────────────────────────────
  function syncToolbar() {
    document.getElementById('tbSelect').classList.toggle('active', state.mode === 'select');
    document.getElementById('tbPan').classList.toggle('active',    state.mode === 'pan');
    document.getElementById('tbDelete').classList.toggle('active', state.mode === 'delete');
    document.getElementById('tbAddMarker').classList.toggle('active', state.mode === 'marker');
    document.getElementById('tb3D').classList.toggle('active', state.is3D);
    canvas.className = 'mode-' + state.mode;
  }

  function setMode(m) {
    state.mode = m;
    if (m !== 'marker') state.pendingMarkerType = null;
    syncToolbar();
    if (m === 'delete') showBanner('Tap any element to delete it', 'err');
    else hideBanner();
  }

  function toggle3D() {
    state.is3D = !state.is3D;
    const wrap = document.getElementById('canvasWrap');
    wrap.classList.toggle('perspective', state.is3D);
    syncToolbar();
  }
  function toggleLayers() {
    state.layersVisible = !state.layersVisible;
    document.getElementById('layersPanel').classList.toggle('hidden', !state.layersVisible);
  }
  function zoom(f) {
    zoomAt(state.cssW/2, state.cssH/2, f);
  }
  function fitToScreen() {
    if (!state.plan) return;
    const pad = 40;
    const zx = (state.cssW - pad*2) / state.plan.canvas_width;
    const zy = (state.cssH - pad*2) / state.plan.canvas_height;
    state.view.zoom = Math.min(zx, zy);
    state.view.offsetX = (state.cssW - state.plan.canvas_width * state.view.zoom) / 2;
    state.view.offsetY = (state.cssH - state.plan.canvas_height * state.view.zoom) / 2;
    redraw();
  }
  function clearAll() {
    if (!confirm('Clear the floor plan? Unsaved changes will be lost.')) return;
    state.plan = null;
    state.markers = [];
    state.selected = null;
    state.meta = null;
    closeEdit();
    document.getElementById('planTitle').textContent = 'No plan loaded';
    redraw();
  }

  function updateCounts() {
    if (!state.plan) {
      ['Walls','Doors','Windows','Objects','Markers'].forEach(k => {
        document.getElementById('cnt'+k).textContent = '0';
      });
      return;
    }
    document.getElementById('cntWalls').textContent   = (state.plan.walls||[]).length;
    document.getElementById('cntDoors').textContent   = (state.plan.doors||[]).length;
    document.getElementById('cntWindows').textContent = (state.plan.windows||[]).length;
    document.getElementById('cntObjects').textContent = (state.plan.objects||[]).length;
    document.getElementById('cntMarkers').textContent = state.markers.length;
  }

  // ─── Banner ───────────────────────────────────────────────────────────
  function showBanner(msg, type) {
    const b = document.getElementById('fpBanner');
    b.className = 'fp-info ' + (type || '');
    b.textContent = msg;
    b.style.display = 'block';
  }
  function hideBanner() { document.getElementById('fpBanner').style.display = 'none'; }

  // ─── Load from API ────────────────────────────────────────────────────
  async function loadLatest() {
    showBanner('Loading latest capture...', '');
    // Determine dept by hostname
    const isPcfd = location.hostname.indexOf('pcfdmembers.org') >= 0;
    state.dept = isPcfd ? 'PCFD' : 'CFD';
    const api = isPcfd ? 'https://preplans.pcfdmembers.org/api/jobs?dept=PCFD&limit=1'
                       : 'https://fdtraining.org/api/jobs?dept=CFD&limit=1';
    try {
      const r = await fetch(api, { credentials: 'omit' });
      const d = await r.json();
      const jobs = d.jobs || d.results || (d.job ? [d.job] : []);
      if (!jobs.length) { showBanner('No captures found', 'err'); return; }
      await loadJob(jobs[0].id || jobs[0].job_id);
    } catch (e) {
      showBanner('Load failed: ' + e.message, 'err');
    }
  }

  async function loadJob(id) {
    const isPcfd = location.hostname.indexOf('pcfdmembers.org') >= 0;
    const api = (isPcfd ? 'https://preplans.pcfdmembers.org' : 'https://fdtraining.org') + '/api/jobs/' + id;
    try {
      const r = await fetch(api, { credentials: 'omit' });
      const d = await r.json();
      const job = d.job || d;
      const layout = (job.ai_form_data && job.ai_form_data.layout) || job.layout;
      if (!layout) { showBanner('Capture has no floor plan data', 'err'); return; }
      state.plan = {
        canvas_width:  layout.canvas_width  || 400,
        canvas_height: layout.canvas_height || 400,
        scale_px_per_ft: layout.scale_px_per_ft || 12,
        walls:   (layout.walls   || []).map(w => ({ x1:w.x1, y1:w.y1, x2:w.x2, y2:w.y2 })),
        doors:   (layout.doors   || []).map(x => ({ x:x.x, y:x.y, width:x.width, angle:x.angle, type:x.type || 'single' })),
        windows: (layout.windows || []).map(x => ({ x:x.x, y:x.y, width:x.width, angle:x.angle })),
        objects: (layout.objects || []).map(x => ({ x:x.x, y:x.y, width:x.width, depth:x.depth, angle:x.angle, category:x.category, label:x.label })),
      };
      state.markers = (job.ai_features || []).map(m => ({
        id: 'mk_imported_' + Math.random().toString(36).slice(2,8),
        marker_type_id: m.marker_type_id || m.id,
        name: m.name || m.marker_name,
        category: m.category,
        x: m.x, y: m.y, note: m.note || ''
      }));
      state.meta = job;
      state.dept = job.department || state.dept;
      document.getElementById('planTitle').textContent = (job.building_name || 'Untitled') + ' · ' + state.dept;
      fitToScreen();
      showBanner('Loaded "' + (job.building_name || 'Untitled') + '" — ' + (state.plan.walls.length) + ' walls, ' + (state.plan.doors||[]).length + ' doors, ' + state.markers.length + ' markers', 'ok');
      setTimeout(hideBanner, 3500);
    } catch (e) {
      showBanner('Load failed: ' + e.message, 'err');
    }
  }

  // ─── Save back to form localStorage ───────────────────────────────────
  function saveToForm() {
    if (!state.plan) { showBanner('No plan to save', 'err'); return; }
    try {
      const saved = JSON.parse(localStorage.getItem('preFirePlan') || '{}');
      saved.floor_plan_data = {
        canvas_width: state.plan.canvas_width,
        canvas_height: state.plan.canvas_height,
        scale_px_per_ft: state.plan.scale_px_per_ft,
        walls: state.plan.walls,
        doors: state.plan.doors,
        windows: state.plan.windows,
        objects: state.plan.objects,
        markers: state.markers,
        savedAt: new Date().toISOString(),
      };
      localStorage.setItem('preFirePlan', JSON.stringify(saved));
      showBanner('✓ Floor plan saved to pre-plan form', 'ok');
      setTimeout(hideBanner, 2500);
    } catch (e) {
      showBanner('Save failed: ' + e.message, 'err');
    }
  }

  // ─── Load floor_plan_data from localStorage on page open ──────────────
  function loadFromForm() {
    try {
      const saved = JSON.parse(localStorage.getItem('preFirePlan') || '{}');
      if (saved.floor_plan_data && saved.floor_plan_data.walls) {
        const fp = saved.floor_plan_data;
        state.plan = {
          canvas_width: fp.canvas_width || 400,
          canvas_height: fp.canvas_height || 400,
          scale_px_per_ft: fp.scale_px_per_ft || 12,
          walls: fp.walls || [], doors: fp.doors || [],
          windows: fp.windows || [], objects: fp.objects || [],
        };
        state.markers = fp.markers || [];
        // Also read scan meta if bridge populated it
        if (saved._scan_meta) {
          state.dept = saved._scan_meta.department || state.dept;
          document.getElementById('planTitle').textContent = (saved.business_name || 'Untitled') + ' · ' + state.dept;
        }
        fitToScreen();
      }
    } catch (e) { console.warn('loadFromForm:', e); }
  }

  // ─── Expose public API ────────────────────────────────────────────────
  window.FP = {
    setMode, toggle3D, toggleLayers, zoom, fitToScreen, clearAll,
    openMarkerPicker, closeMarkerPicker,
    deleteSelected, closeEdit,
    loadLatest, loadJob, saveToForm,
    redraw,
  };

  // ─── Boot ─────────────────────────────────────────────────────────────
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  loadFromForm();
  syncToolbar();
  if (!state.plan) showBanner('Tap "Load Latest" to import your DivisionScan capture', '');
})();
</script>
