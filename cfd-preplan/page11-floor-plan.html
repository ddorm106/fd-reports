<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Pre-Fire Plan · Floor Plan</title>
<link rel="stylesheet" href="styles-preplan.css">
<style>
:root {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --border: #d1d9e3;
  --muted: #64748b;
  --text: #1e293b;
  --primary: #1e3a5f;
  --primary-hover: #163050;
  --accent: #c0392b;
  --success: #16a34a;
  --wall: #0f172a;
  --door: #ea580c;
  --window: #0ea5e9;
  --object: #7c3aed;
  --marker: #dc2626;
  --selection: #fbbf24;
}
* { box-sizing: border-box; }
body.fp-body { background: var(--bg); }
.fp-host {
  max-width: 1400px; margin: 0 auto; padding: 16px; color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.fp-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.fp-head h2 { font-size: 20px; margin: 0; font-weight: 700; color: var(--primary); }
.fp-head .fp-sub { color: var(--muted); font-size: 13px; }
.fp-head .fp-grow { flex: 1; }
.fp-toolbar {
  display: flex; gap: 6px; padding: 8px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
  flex-wrap: wrap; align-items: center;
}
.fp-toolbar .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
.fp-btn {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); color: var(--text); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
.fp-btn:hover { background: #eef2f7; }
.fp-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.fp-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.fp-btn.primary:hover { background: var(--primary-hover); }
.fp-btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.fp-btn.ghost { background: transparent; border-color: transparent; color: var(--muted); }
.fp-btn.ghost:hover { background: #eef2f7; color: var(--text); }
.fp-btn.sm { padding: 6px 10px; font-size: 12px; }
.fp-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.fp-stage {
  position: relative; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; touch-action: none;
  height: 70vh; min-height: 500px;
}
.fp-canvas-wrap {
  position: absolute; inset: 0; overflow: hidden;
  background-image:
    linear-gradient(to right, rgba(15,23,42,0.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(15,23,42,0.04) 1px, transparent 1px);
  background-size: 20px 20px;
}
.fp-canvas-wrap.threed { perspective: 1200px; perspective-origin: 50% 85%; }
.fp-canvas-wrap.threed canvas {
  transform: rotateX(55deg) scale(0.9);
  transform-origin: 50% 50%;
  transition: transform 0.4s ease;
  box-shadow: 0 30px 60px rgba(0,0,0,0.25);
}
.fp-canvas-wrap canvas {
  position: absolute; top: 0; left: 0;
  image-rendering: crisp-edges;
  transition: transform 0s;
}
.fp-status {
  position: absolute; bottom: 8px; left: 8px; padding: 4px 10px;
  background: rgba(255,255,255,0.9); border: 1px solid var(--border);
  border-radius: 6px; font-size: 11px; color: var(--muted);
  pointer-events: none; font-family: ui-monospace, monospace;
}
.fp-empty {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; color: var(--muted);
  text-align: center; padding: 20px; pointer-events: none;
}
.fp-empty.hidden { display: none; }
.fp-empty .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.fp-empty h3 { font-size: 18px; margin: 0 0 4px; color: var(--text); }

/* Layers panel (pops out from right) */
.fp-layers {
  position: absolute; top: 8px; right: 8px; width: 220px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px; font-size: 13px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1); display: none; z-index: 10;
}
.fp-layers.open { display: block; }
.fp-layers h4 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; }
.fp-layer-row {
  display: flex; align-items: center; gap: 8px; padding: 6px 4px;
  cursor: pointer; border-radius: 6px; user-select: none;
}
.fp-layer-row:hover { background: #f1f5f9; }
.fp-layer-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
.fp-layer-row .swatch { width: 14px; height: 14px; border-radius: 3px; }
.fp-layer-row .count { margin-left: auto; color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }

/* Edit panel (bottom) */
.fp-edit-panel {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  width: min(520px, calc(100% - 32px));
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none; z-index: 15;
}
.fp-edit-panel.open { display: block; }
.fp-edit-panel .ep-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.fp-edit-panel .ep-title { font-weight: 700; font-size: 14px; color: var(--primary); }
.fp-edit-panel .ep-sub { color: var(--muted); font-size: 12px; }
.fp-edit-panel .ep-grow { flex: 1; }
.fp-edit-panel .ep-body { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.fp-edit-panel label { font-size: 12px; color: var(--muted); }
.fp-edit-panel input[type=text], .fp-edit-panel select {
  padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; background: #fff; color: var(--text);
}
.fp-edit-panel .door-type-group { display: inline-flex; gap: 4px; }
.fp-edit-panel .door-type-group .fp-btn.sm { font-size: 11px; padding: 4px 8px; }

/* Marker placement palette */
.fp-marker-palette {
  position: absolute; top: 60px; left: 8px; width: 260px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px; font-size: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1); display: none; z-index: 10;
}
.fp-marker-palette.open { display: block; }
.fp-marker-palette h4 { margin: 0 0 8px; font-size: 11px; text-transform: uppercase; color: var(--muted); }
.fp-marker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.fp-marker-chip {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 4px; border: 1px solid var(--border); border-radius: 6px;
  cursor: pointer; font-size: 10px; text-align: center; line-height: 1.2;
  background: #fff;
}
.fp-marker-chip:hover { background: #f1f5f9; }
.fp-marker-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.fp-marker-chip .chip-icon { font-size: 16px; }

/* Toasts */
.fp-toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  padding: 10px 18px; background: #0f172a; color: #fff; border-radius: 8px;
  font-size: 13px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 200;
  opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
}
.fp-toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
.fp-toast.ok { background: var(--success); }
.fp-toast.err { background: var(--accent); }

@media (max-width: 720px) {
  .fp-layers { width: 180px; }
  .fp-marker-palette { width: 220px; top: 56px; }
  .fp-edit-panel { width: calc(100% - 16px); }
  .fp-btn { padding: 7px 10px; font-size: 12px; }
  .fp-stage { height: 60vh; min-height: 400px; }
}
</style>
</head>
<body class="fp-body">

    <h2>🏢 Pre-Fire Plan — Floor Plan</h2>

<div class="fp-toast" id="toast"></div>

<script>
// ============================================================================
// Floor Plan Editor v2 — clean canvas-based implementation
// ============================================================================
// Data model stored in localStorage.preFirePlan.floor_plan_data:
//   {
//     canvas_width, canvas_height, scale_px_per_ft,
//     walls:    [{x1, y1, x2, y2}],
//     doors:    [{x, y, width, angle, type}],
//     windows:  [{x, y, width, angle}],
//     objects:  [{x, y, width, depth, angle, category, label}],
//     markers:  [{id, type, x, y, label, note}]
//   }

(function() {
'use strict';

// ---------- Marker types (fire service semiotics) ----------
const MARKER_TYPES = [
  { id: 'fdc',             label: 'FDC',         icon: '🚒', color: '#dc2626', abbr: 'FDC' },
  { id: 'knox_box',        label: 'Knox Box',    icon: '🔑', color: '#f59e0b', abbr: 'KX'  },
  { id: 'fire_hydrant',    label: 'Hydrant',     icon: '⛲', color: '#1e40af', abbr: 'HY'  },
  { id: 'sprinkler_riser', label: 'Spr Riser',   icon: '💧', color: '#0891b2', abbr: 'SR'  },
  { id: 'fire_alarm_panel',label: 'FA Panel',    icon: '🚨', color: '#b91c1c', abbr: 'FAP' },
  { id: 'gas_shutoff',     label: 'Gas Shutoff', icon: '🔥', color: '#eab308', abbr: 'GAS' },
  { id: 'electric_panel',  label: 'Elec Panel',  icon: '⚡', color: '#a855f7', abbr: 'ELEC'},
  { id: 'water_shutoff',   label: 'Water Off',   icon: '🚰', color: '#0ea5e9', abbr: 'H2O' },
  { id: 'exit',            label: 'Exit',        icon: '🚪', color: '#16a34a', abbr: 'EXIT'},
  { id: 'stairs',          label: 'Stairs',      icon: '🪜', color: '#64748b', abbr: 'STR' },
  { id: 'elevator',        label: 'Elevator',    icon: '🛗', color: '#475569', abbr: 'ELV' },
  { id: 'hazmat',          label: 'Hazmat',      icon: '☣️', color: '#7c2d12', abbr: 'HAZ' },
];

// ---------- State ----------
const state = {
  data: null,      // floor_plan_data object
  view: { zoom: 1, panX: 0, panY: 0, width: 0, height: 0 },
  tool: 'select', // select | pan | marker | delete
  selectedMarkerType: 'fdc',
  selected: null, // { kind: 'wall'|'door'|'window'|'object'|'marker', index: N }
  visibleLayers: { walls: true, doors: true, windows: true, objects: true, markers: true, grid: true },
  threeD: false,
  scanMeta: null,  // { scan_id, captured_by, scan_date, department, ... }
  drag: null,      // active drag
  dpr: window.devicePixelRatio || 1,
};

// ---------- DOM refs ----------
const stage = document.getElementById('stage');
const wrap  = document.getElementById('canvas-wrap');
const canvas = document.getElementById('fp-canvas');
const ctx = canvas.getContext('2d');
const emptyState = document.getElementById('empty-state');
const statusEl = document.getElementById('status');
const editPanel = document.getElementById('edit-panel');
const layersPanel = document.getElementById('layers');
const markerPalette = document.getElementById('marker-palette');
const toast = document.getElementById('toast');

// ---------- Helpers ----------
function showToast(msg, kind) {
  toast.textContent = msg;
  toast.className = 'fp-toast show' + (kind ? ' ' + kind : '');
  setTimeout(() => toast.className = 'fp-toast', 2500);
}
function degToRad(d) { return d * Math.PI / 180; }
function dist(x1, y1, x2, y2) { return Math.hypot(x2-x1, y2-y1); }

// ---------- Data persistence ----------
function emptyData() {
  return {
    canvas_width: 1000, canvas_height: 700, scale_px_per_ft: 12,
    walls: [], doors: [], windows: [], objects: [], markers: []
  };
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem('preFirePlan');
    if (!raw) return null;
    const plan = JSON.parse(raw);
    if (plan.floor_plan_data) return plan.floor_plan_data;
    return null;
  } catch (e) { return null; }
}
function saveToStorage() {
  if (!state.data) return;
  let plan = {};
  try { plan = JSON.parse(localStorage.getItem('preFirePlan') || '{}'); } catch (e) {}
  plan.floor_plan_data = state.data;
  plan.floor_plan_data.savedAt = new Date().toISOString();
  localStorage.setItem('preFirePlan', JSON.stringify(plan));
}

// ---------- Capture import ----------
function ingestJobPayload(job) {
  const layout = (job && job.ai_form_data && job.ai_form_data.layout) || null;
  if (!layout || !layout.walls) {
    showToast('No layout data in that capture', 'err');
    return false;
  }
  const data = {
    canvas_width:    layout.canvas_width  || 1000,
    canvas_height:   layout.canvas_height || 700,
    scale_px_per_ft: layout.scale_px_per_ft || 12,
    walls:   (layout.walls   || []).slice(),
    doors:   (layout.doors   || []).slice(),
    windows: (layout.windows || []).slice(),
    objects: (layout.objects || []).slice(),
    markers: []
  };
  // Preserve any ai_features (markers placed at capture time) as real markers
  if (Array.isArray(job.ai_features)) {
    const sc = data.scale_px_per_ft;
    job.ai_features.forEach((f, i) => {
      // f.x/y could be in either ft or px — guess: if magnitude < canvas_width/scale, it's ft
      let x = typeof f.x === 'number' ? f.x : 0;
      let y = typeof f.y === 'number' ? f.y : 0;
      // We emit markers in ai_features using canvas px coords already in the worker
      data.markers.push({
        id: 'm_' + Date.now() + '_' + i,
        type: f.category || f.name || 'marker',
        x: x, y: y,
        label: f.name || f.category || '',
        note: f.note || ''
      });
    });
  }
  state.data = data;
  state.scanMeta = {
    scan_id: job.id,
    captured_by: job.captured_by,
    scan_date: job.created_at,
    department: job.department,
    building_name: job.building_name,
    marker_count: data.markers.length
  };
  updateMeta();
  updateCounts();
  hideEmpty();
  fitToView();
  draw();
  return true;
}

async function loadLatestCapture() {
  // Hostname-aware: CFD on fdtraining, PCFD on preplans.pcfdmembers
  const host = window.location.hostname;
  const dept = host.includes('pcfdmembers') ? 'PCFD' : 'CFD';
  try {
    const listRes = await fetch(`/api/jobs?dept=${dept}&limit=1`, { cache: 'no-store' });
    if (!listRes.ok) throw new Error('HTTP ' + listRes.status);
    const list = await listRes.json();
    const jobs = list.jobs || [];
    if (!jobs.length) { showToast('No captures found for ' + dept, 'err'); return; }
    const jobId = jobs[0].id;
    const jobRes = await fetch(`/api/jobs/${jobId}`, { cache: 'no-store' });
    if (!jobRes.ok) throw new Error('HTTP ' + jobRes.status);
    const jobData = await jobRes.json();
    const job = jobData.job || jobData;
    if (ingestJobPayload(job)) {
      showToast(`Loaded: ${job.building_name || job.id}`, 'ok');
      saveToStorage();
    }
  } catch (e) {
    showToast('Load failed: ' + (e.message || e), 'err');
  }
}

// ---------- View transforms ----------
function resizeCanvas() {
  const rect = wrap.getBoundingClientRect();
  state.view.width = rect.width;
  state.view.height = rect.height;
  canvas.width  = Math.floor(rect.width  * state.dpr);
  canvas.height = Math.floor(rect.height * state.dpr);
  canvas.style.width  = rect.width  + 'px';
  canvas.style.height = rect.height + 'px';
  draw();
}

function dataToScreen(x, y) {
  return {
    sx: x * state.view.zoom + state.view.panX,
    sy: y * state.view.zoom + state.view.panY
  };
}
function screenToData(sx, sy) {
  return {
    x: (sx - state.view.panX) / state.view.zoom,
    y: (sy - state.view.panY) / state.view.zoom
  };
}

function fitToView() {
  if (!state.data) return;
  const padding = 40;
  const cw = state.data.canvas_width;
  const ch = state.data.canvas_height;
  const zx = (state.view.width - padding*2) / cw;
  const zy = (state.view.height - padding*2) / ch;
  state.view.zoom = Math.min(zx, zy, 2.0);
  state.view.panX = (state.view.width - cw * state.view.zoom) / 2;
  state.view.panY = (state.view.height - ch * state.view.zoom) / 2;
  draw();
}

// ---------- Draw ----------
function clearCanvas() {
  ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
  ctx.clearRect(0, 0, state.view.width, state.view.height);
}

function draw() {
  clearCanvas();
  if (!state.data) { updateStatus(); return; }
  const d = state.data;

  // Apply pan+zoom
  ctx.save();
  ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
  ctx.translate(state.view.panX, state.view.panY);
  ctx.scale(state.view.zoom, state.view.zoom);

  // Draw order: objects (floor) → walls → windows → doors → markers (top)
  if (state.visibleLayers.objects) d.objects.forEach((o, i) => drawObject(o, isSelected('object', i)));
  if (state.visibleLayers.walls)   d.walls.forEach((w, i) => drawWall(w, isSelected('wall', i)));
  if (state.visibleLayers.windows) d.windows.forEach((w, i) => drawWindow(w, isSelected('window', i)));
  if (state.visibleLayers.doors)   d.doors.forEach((dr, i) => drawDoor(dr, isSelected('door', i)));
  if (state.visibleLayers.markers) d.markers.forEach((m, i) => drawMarker(m, isSelected('marker', i)));

  ctx.restore();
  updateStatus();
}

function isSelected(kind, index) {
  return state.selected && state.selected.kind === kind && state.selected.index === index;
}

function drawWall(w, sel) {
  ctx.beginPath();
  ctx.moveTo(w.x1, w.y1);
  ctx.lineTo(w.x2, w.y2);
  ctx.lineWidth = sel ? 6 / state.view.zoom : 4 / state.view.zoom;
  ctx.strokeStyle = sel ? '#fbbf24' : '#0f172a';
  ctx.lineCap = 'square';
  ctx.stroke();
}

function drawDoor(d, sel) {
  const cx = d.x, cy = d.y;
  const w = d.width || 30;
  const a = degToRad(d.angle || 0);
  const dx = Math.cos(a) * w / 2;
  const dy = Math.sin(a) * w / 2;
  // Opening — break in wall
  ctx.save();
  ctx.lineWidth = 8 / state.view.zoom;
  ctx.strokeStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(cx - dx, cy - dy);
  ctx.lineTo(cx + dx, cy + dy);
  ctx.stroke();
  // Door swing arc (single door = quarter circle, double = two arcs, rollup = dashed)
  ctx.lineWidth = (sel ? 3 : 1.5) / state.view.zoom;
  ctx.strokeStyle = sel ? '#fbbf24' : '#ea580c';
  if (d.type === 'rollup') {
    ctx.setLineDash([4/state.view.zoom, 3/state.view.zoom]);
    ctx.beginPath();
    ctx.moveTo(cx - dx, cy - dy);
    ctx.lineTo(cx + dx, cy + dy);
    ctx.stroke();
    ctx.setLineDash([]);
  } else if (d.type === 'double') {
    // Two arcs from each end, meeting in middle
    ctx.beginPath();
    ctx.arc(cx - dx, cy - dy, w/2, a, a + Math.PI/2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx + dx, cy + dy, w/2, a + Math.PI, a + Math.PI + Math.PI/2);
    ctx.stroke();
  } else {
    // Single — arc from one endpoint
    ctx.beginPath();
    ctx.arc(cx - dx, cy - dy, w, a, a + Math.PI/2);
    ctx.stroke();
    // Line from hinge to opposite end (shows door leaf when closed)
    ctx.beginPath();
    ctx.moveTo(cx - dx, cy - dy);
    ctx.lineTo(cx + dx, cy + dy);
    ctx.stroke();
  }
  ctx.restore();
}

function drawWindow(w, sel) {
  const cx = w.x, cy = w.y;
  const width = w.width || 30;
  const a = degToRad(w.angle || 0);
  const dx = Math.cos(a) * width / 2;
  const dy = Math.sin(a) * width / 2;
  // Break the wall
  ctx.save();
  ctx.lineWidth = 8 / state.view.zoom;
  ctx.strokeStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(cx - dx, cy - dy);
  ctx.lineTo(cx + dx, cy + dy);
  ctx.stroke();
  // Triple line glyph for window (classic floor plan symbol)
  ctx.lineWidth = (sel ? 3 : 1.5) / state.view.zoom;
  ctx.strokeStyle = sel ? '#fbbf24' : '#0ea5e9';
  const perp = { x: -Math.sin(a), y: Math.cos(a) };
  const off = 3 / state.view.zoom;
  [-off, 0, off].forEach(o => {
    ctx.beginPath();
    ctx.moveTo(cx - dx + perp.x * o, cy - dy + perp.y * o);
    ctx.lineTo(cx + dx + perp.x * o, cy + dy + perp.y * o);
    ctx.stroke();
  });
  ctx.restore();
}

function drawObject(o, sel) {
  const cx = o.x, cy = o.y;
  const w = o.width || 20;
  const h = o.depth || 20;
  const a = degToRad(o.angle || 0);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(a);
  ctx.fillStyle = sel ? 'rgba(251,191,36,0.4)' : 'rgba(124,58,237,0.18)';
  ctx.strokeStyle = sel ? '#fbbf24' : '#7c3aed';
  ctx.lineWidth = (sel ? 2 : 1) / state.view.zoom;
  ctx.fillRect(-w/2, -h/2, w, h);
  ctx.strokeRect(-w/2, -h/2, w, h);
  // Label (upright, small)
  if (o.label && state.view.zoom > 0.25) {
    ctx.rotate(-a);
    ctx.fillStyle = sel ? '#78350f' : '#5b21b6';
    ctx.font = (11 / state.view.zoom) + 'px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(o.label, 0, 0);
  }
  ctx.restore();
}

function drawMarker(m, sel) {
  const meta = MARKER_TYPES.find(t => t.id === m.type) || { color: '#dc2626', abbr: 'M' };
  const r = sel ? 14 / state.view.zoom : 12 / state.view.zoom;
  // Shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetY = 2;
  ctx.fillStyle = sel ? '#fbbf24' : meta.color;
  ctx.beginPath();
  ctx.arc(m.x, m.y, r, 0, 2*Math.PI);
  ctx.fill();
  ctx.restore();
  // Ring
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5 / state.view.zoom;
  ctx.stroke();
  // Abbreviation
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (r * 0.85) + 'px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(meta.abbr.slice(0, 3), m.x, m.y);
}

// ---------- Hit testing ----------
function hitTest(sx, sy) {
  if (!state.data) return null;
  const {x, y} = screenToData(sx, sy);
  const tol = 8 / state.view.zoom;
  const d = state.data;

  // Check markers first (drawn on top)
  if (state.visibleLayers.markers) {
    for (let i = d.markers.length - 1; i >= 0; i--) {
      const m = d.markers[i];
      if (dist(x, y, m.x, m.y) < 14 / state.view.zoom + tol) return { kind: 'marker', index: i };
    }
  }
  // Doors (small circles around door center)
  if (state.visibleLayers.doors) {
    for (let i = d.doors.length - 1; i >= 0; i--) {
      const dr = d.doors[i];
      const r = Math.max(dr.width / 2 + tol, tol * 2.5);
      if (dist(x, y, dr.x, dr.y) < r) return { kind: 'door', index: i };
    }
  }
  // Windows
  if (state.visibleLayers.windows) {
    for (let i = d.windows.length - 1; i >= 0; i--) {
      const w = d.windows[i];
      const r = Math.max(w.width / 2 + tol, tol * 2.5);
      if (dist(x, y, w.x, w.y) < r) return { kind: 'window', index: i };
    }
  }
  // Objects (rotated rect)
  if (state.visibleLayers.objects) {
    for (let i = d.objects.length - 1; i >= 0; i--) {
      const o = d.objects[i];
      const a = -degToRad(o.angle || 0);
      const dx = x - o.x, dy = y - o.y;
      const lx = dx * Math.cos(a) - dy * Math.sin(a);
      const ly = dx * Math.sin(a) + dy * Math.cos(a);
      if (Math.abs(lx) < o.width/2 + tol && Math.abs(ly) < o.depth/2 + tol) {
        return { kind: 'object', index: i };
      }
    }
  }
  // Walls (line segment hit test)
  if (state.visibleLayers.walls) {
    for (let i = d.walls.length - 1; i >= 0; i--) {
      const w = d.walls[i];
      if (pointToSegmentDist(x, y, w.x1, w.y1, w.x2, w.y2) < tol + 3/state.view.zoom) {
        return { kind: 'wall', index: i };
      }
    }
  }
  return null;
}

function pointToSegmentDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx*dx + dy*dy;
  if (lenSq === 0) return dist(px, py, x1, y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return dist(px, py, x1 + t*dx, y1 + t*dy);
}

// ---------- Interactions ----------
function setTool(t) {
  state.tool = t;
  document.querySelectorAll('.fp-toolbar .fp-btn[data-tool]').forEach(el => {
    el.classList.toggle('active', el.dataset.tool === t);
  });
  // Show/hide marker palette
  markerPalette.classList.toggle('open', t === 'marker');
  // Cursor hint
  wrap.style.cursor = t === 'pan' ? 'grab' : t === 'delete' ? 'crosshair' : 'default';
  // Deselect if switching away from select
  if (t !== 'select') { state.selected = null; hideEditPanel(); draw(); }
}

function selectElement(hit) {
  state.selected = hit;
  if (hit) {
    showEditPanel(hit);
  } else {
    hideEditPanel();
  }
  draw();
}

// Pointer events (unified touch + mouse)
let lastPinchDist = 0;
let pointerCache = new Map();

wrap.addEventListener('pointerdown', (e) => {
  wrap.setPointerCapture(e.pointerId);
  pointerCache.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointerCache.size === 2) {
    // Pinch start
    const pts = Array.from(pointerCache.values());
    lastPinchDist = dist(pts[0].x, pts[0].y, pts[1].x, pts[1].y);
    state.drag = { kind: 'pinch' };
    return;
  }
  const rect = wrap.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (state.tool === 'marker') {
    // Place marker at tap
    const {x, y} = screenToData(sx, sy);
    placeMarkerAt(x, y);
    return;
  }

  if (state.tool === 'delete') {
    const hit = hitTest(sx, sy);
    if (hit) {
      deleteElement(hit);
      showToast('Deleted ' + hit.kind, 'ok');
    }
    return;
  }

  // Select or pan
  if (state.tool === 'select') {
    const hit = hitTest(sx, sy);
    if (hit) {
      selectElement(hit);
      state.drag = { kind: 'move', hit, startSX: sx, startSY: sy,
                     origX: getElemX(hit), origY: getElemY(hit), moved: false };
    } else {
      // Empty area tap → deselect + start pan
      state.selected = null;
      hideEditPanel();
      state.drag = { kind: 'pan', startX: sx - state.view.panX, startY: sy - state.view.panY };
      draw();
    }
  } else if (state.tool === 'pan') {
    state.drag = { kind: 'pan', startX: sx - state.view.panX, startY: sy - state.view.panY };
  }
});

wrap.addEventListener('pointermove', (e) => {
  if (!pointerCache.has(e.pointerId)) return;
  pointerCache.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (state.drag && state.drag.kind === 'pinch' && pointerCache.size === 2) {
    const pts = Array.from(pointerCache.values());
    const newDist = dist(pts[0].x, pts[0].y, pts[1].x, pts[1].y);
    const cx = (pts[0].x + pts[1].x) / 2;
    const cy = (pts[0].y + pts[1].y) / 2;
    const rect = wrap.getBoundingClientRect();
    zoomAt(cx - rect.left, cy - rect.top, newDist / lastPinchDist);
    lastPinchDist = newDist;
    return;
  }

  if (!state.drag || pointerCache.size > 1) return;
  const rect = wrap.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (state.drag.kind === 'pan') {
    state.view.panX = sx - state.drag.startX;
    state.view.panY = sy - state.drag.startY;
    draw();
  } else if (state.drag.kind === 'move') {
    const dx = (sx - state.drag.startSX) / state.view.zoom;
    const dy = (sy - state.drag.startSY) / state.view.zoom;
    if (Math.hypot(dx, dy) > 2) state.drag.moved = true;
    setElemPos(state.drag.hit, state.drag.origX + dx, state.drag.origY + dy);
    draw();
  }
});

function endPointer(e) {
  if (pointerCache.has(e.pointerId)) pointerCache.delete(e.pointerId);
  if (pointerCache.size < 2) lastPinchDist = 0;
  if (pointerCache.size === 0) {
    if (state.drag && state.drag.kind === 'move' && state.drag.moved) saveToStorage();
    state.drag = null;
  }
}
wrap.addEventListener('pointerup', endPointer);
wrap.addEventListener('pointercancel', endPointer);
wrap.addEventListener('pointerleave', endPointer);

// Mouse wheel zoom
wrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
  zoomAt(sx, sy, factor);
}, { passive: false });

function zoomAt(sx, sy, factor) {
  const newZoom = Math.max(0.1, Math.min(8, state.view.zoom * factor));
  const actual = newZoom / state.view.zoom;
  // Keep the point under cursor fixed
  state.view.panX = sx - (sx - state.view.panX) * actual;
  state.view.panY = sy - (sy - state.view.panY) * actual;
  state.view.zoom = newZoom;
  draw();
}

// ---------- Element helpers ----------
function getElem(hit) {
  if (!hit || !state.data) return null;
  const arr = state.data[hit.kind + 's'];
  return arr && arr[hit.index];
}
function getElemX(hit) {
  const e = getElem(hit);
  if (!e) return 0;
  return hit.kind === 'wall' ? (e.x1 + e.x2) / 2 : e.x;
}
function getElemY(hit) {
  const e = getElem(hit);
  if (!e) return 0;
  return hit.kind === 'wall' ? (e.y1 + e.y2) / 2 : e.y;
}
function setElemPos(hit, x, y) {
  const e = getElem(hit);
  if (!e) return;
  if (hit.kind === 'wall') {
    const cx = (e.x1 + e.x2) / 2, cy = (e.y1 + e.y2) / 2;
    const dx = x - cx, dy = y - cy;
    e.x1 += dx; e.x2 += dx; e.y1 += dy; e.y2 += dy;
  } else {
    e.x = x; e.y = y;
  }
}

function deleteElement(hit) {
  const arr = state.data[hit.kind + 's'];
  if (!arr) return;
  arr.splice(hit.index, 1);
  state.selected = null;
  hideEditPanel();
  updateCounts();
  saveToStorage();
  draw();
}

function placeMarkerAt(x, y) {
  const meta = MARKER_TYPES.find(t => t.id === state.selectedMarkerType);
  if (!state.data) state.data = emptyData();
  state.data.markers.push({
    id: 'm_' + Date.now(),
    type: state.selectedMarkerType,
    x: x, y: y,
    label: meta ? meta.label : state.selectedMarkerType,
    note: ''
  });
  updateCounts();
  saveToStorage();
  draw();
  showToast('Marker placed', 'ok');
  // Stay in marker mode for chain placement — user has to switch back to select manually
}

// ---------- Edit panel ----------
function showEditPanel(hit) {
  const e = getElem(hit);
  if (!e) return;
  document.getElementById('ep-title').textContent = hit.kind[0].toUpperCase() + hit.kind.slice(1) + ' #' + (hit.index + 1);
  let sub = '';
  const sf = state.data.scale_px_per_ft || 12;
  if (hit.kind === 'wall')   sub = `Length: ${(dist(e.x1, e.y1, e.x2, e.y2) / sf).toFixed(1)} ft`;
  else if (hit.kind === 'door' || hit.kind === 'window') sub = `Width: ${(e.width / sf).toFixed(1)} ft`;
  else if (hit.kind === 'object') sub = `${(e.width / sf).toFixed(1)} × ${(e.depth / sf).toFixed(1)} ft${e.label ? ' · ' + e.label : ''}`;
  else if (hit.kind === 'marker') sub = (MARKER_TYPES.find(t => t.id === e.type) || {}).label || e.type;
  document.getElementById('ep-sub').textContent = sub;

  // Body (type-specific edits)
  const body = document.getElementById('ep-body');
  body.innerHTML = '';
  if (hit.kind === 'door') {
    const group = document.createElement('div');
    group.className = 'door-type-group';
    ['single', 'double', 'rollup'].forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'fp-btn sm' + (e.type === t ? ' active' : '');
      btn.textContent = t;
      btn.onclick = () => { e.type = t; saveToStorage(); showEditPanel(hit); draw(); };
      group.appendChild(btn);
    });
    const lbl = document.createElement('label'); lbl.textContent = 'Type:';
    body.appendChild(lbl); body.appendChild(group);
  } else if (hit.kind === 'object') {
    const lbl = document.createElement('label'); lbl.textContent = 'Label:';
    const input = document.createElement('input'); input.type = 'text'; input.value = e.label || '';
    input.oninput = () => { e.label = input.value; };
    input.onchange = () => { saveToStorage(); draw(); };
    body.appendChild(lbl); body.appendChild(input);
  } else if (hit.kind === 'marker') {
    const lblN = document.createElement('label'); lblN.textContent = 'Note:';
    const inp = document.createElement('input'); inp.type = 'text'; inp.value = e.note || '';
    inp.oninput = () => { e.note = inp.value; };
    inp.onchange = () => { saveToStorage(); };
    body.appendChild(lblN); body.appendChild(inp);
  } else {
    body.innerHTML = '<span style="color:var(--muted); font-size:12px;">Drag to reposition, or click Delete to remove.</span>';
  }
  editPanel.classList.add('open');
}
function hideEditPanel() { editPanel.classList.remove('open'); }

document.getElementById('ep-delete').addEventListener('click', () => {
  if (state.selected) {
    deleteElement(state.selected);
    showToast('Deleted', 'ok');
  }
});
document.getElementById('ep-close').addEventListener('click', () => {
  state.selected = null; hideEditPanel(); draw();
});

// ---------- UI wiring ----------
document.querySelectorAll('[data-tool]').forEach(el => {
  el.addEventListener('click', () => setTool(el.dataset.tool));
});
document.getElementById('btn-3d').addEventListener('click', (e) => {
  state.threeD = !state.threeD;
  wrap.classList.toggle('threed', state.threeD);
  e.currentTarget.classList.toggle('active', state.threeD);
});
document.getElementById('btn-layers').addEventListener('click', (e) => {
  layersPanel.classList.toggle('open');
  e.currentTarget.classList.toggle('active', layersPanel.classList.contains('open'));
});
document.querySelectorAll('#layers input[data-layer]').forEach(cb => {
  cb.addEventListener('change', () => {
    state.visibleLayers[cb.dataset.layer] = cb.checked;
    draw();
  });
});
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  zoomAt(state.view.width/2, state.view.height/2, 1.25);
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  zoomAt(state.view.width/2, state.view.height/2, 1/1.25);
});
document.getElementById('btn-fit').addEventListener('click', fitToView);
document.getElementById('btn-load-latest').addEventListener('click', loadLatestCapture);
document.getElementById('btn-save').addEventListener('click', () => {
  saveToStorage();
  showToast('Saved to pre-plan', 'ok');
});
document.getElementById('btn-clear').addEventListener('click', () => {
  if (!state.data) return;
  if (confirm('Clear the entire floor plan? This cannot be undone.')) {
    state.data = null;
    state.selected = null;
    state.scanMeta = null;
    try {
      const plan = JSON.parse(localStorage.getItem('preFirePlan') || '{}');
      delete plan.floor_plan_data;
      localStorage.setItem('preFirePlan', JSON.stringify(plan));
    } catch(e){}
    hideEditPanel();
    showEmpty();
    updateMeta();
    updateCounts();
    draw();
  }
});

// ---------- Marker palette ----------
(function buildMarkerPalette() {
  const grid = document.getElementById('marker-grid');
  MARKER_TYPES.forEach(t => {
    const chip = document.createElement('div');
    chip.className = 'fp-marker-chip' + (t.id === state.selectedMarkerType ? ' active' : '');
    chip.innerHTML = `<span class="chip-icon">${t.icon}</span><span>${t.label}</span>`;
    chip.onclick = () => {
      state.selectedMarkerType = t.id;
      document.querySelectorAll('.fp-marker-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    };
    grid.appendChild(chip);
  });
})();

// ---------- UI updates ----------
function updateMeta() {
  const el = document.getElementById('fp-meta');
  if (state.scanMeta) {
    const dt = state.scanMeta.scan_date ? new Date(state.scanMeta.scan_date).toLocaleString() : '';
    el.textContent = [state.scanMeta.department, state.scanMeta.building_name, dt].filter(Boolean).join(' · ');
  } else {
    el.textContent = state.data ? 'Loaded from local storage' : 'No capture loaded';
  }
}
function updateCounts() {
  const d = state.data || emptyData();
  document.getElementById('ct-walls').textContent   = (d.walls || []).length;
  document.getElementById('ct-doors').textContent   = (d.doors || []).length;
  document.getElementById('ct-windows').textContent = (d.windows || []).length;
  document.getElementById('ct-objects').textContent = (d.objects || []).length;
  document.getElementById('ct-markers').textContent = (d.markers || []).length;
}
function updateStatus() {
  const z = (state.view.zoom * 100).toFixed(0);
  const tool = state.tool;
  statusEl.textContent = `Tool: ${tool} · Zoom: ${z}% · Pan: (${state.view.panX.toFixed(0)}, ${state.view.panY.toFixed(0)})`;
}
function showEmpty() { emptyState.classList.remove('hidden'); }
function hideEmpty() { emptyState.classList.add('hidden'); }

// ---------- Init ----------
function init() {
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const saved = loadFromStorage();
  if (saved && (saved.walls || []).length) {
    state.data = saved;
    hideEmpty();
    fitToView();
  } else {
    showEmpty();
  }
  updateMeta();
  updateCounts();
  draw();
}
init();

// Expose a tiny API for debugging
window.FP = { state, draw, fitToView, loadLatestCapture };

})();
</script>
</body>
</html>
